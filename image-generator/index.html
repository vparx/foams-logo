<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOAMS Image Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      background: #111;
      min-height: 100vh;
      padding: 0 1rem 4rem;
      color: #bbb;
    }

    .version {
      font-size: 10px; color: rgba(255,255,255,0.2); font-family: monospace;
      letter-spacing: 0.05em;
    }

    /* ════════════ STICKY TOP ════════════ */
    .sticky-top {
      position: sticky; top: 0; z-index: 200;
      background: #111;
      padding-top: 6px; padding-bottom: 8px; margin-bottom: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.8);
    }

    /* ════════════ PLAY AREA ════════════ */
    .play-area-outer {
      border-radius: 8px;
      background: #000; position: relative;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .play-area-outer.landscape { width: 100%; aspect-ratio: 1920 / 1080; }
    .play-area-outer.portrait  { aspect-ratio: 1080 / 1920; width: 260px; margin: 0 auto; }

    .play-area-inner {
      width: 100%; height: 100%; position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      border-radius: 8px; /* clip bg/logo to the rounded canvas */
    }

    #bgImage {
      position: absolute;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #bgImage[src]:not([src=""]) { opacity: 1; }


    /* Transform corner handles */
    .t-handle {
      position: absolute; width: 10px; height: 10px;
      border: 1.5px solid rgba(0,0,0,0.3);
      border-radius: 2px; pointer-events: all; cursor: nwse-resize;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .t-handle[data-corner="tr"], .t-handle[data-corner="bl"] { cursor: nesw-resize; }
    .el-handle { background: #fff; }
    .logo-handle { background: #ff64b4; }
    .gen-handle { background: #64dcff; }
    .title-handle { background: #ffdc3c; }
    #titleDraggable, #titleHandles, #titleRotHandle, .title-handle { pointer-events: all !important; }
    #elPreview:active, #basePreview:active { cursor: grabbing; }

    #logoLayer { position: absolute; inset: 0; pointer-events: none; z-index: 4; }
    #logoDraggable, #logoHandles, #logoRotHandle, .logo-handle { pointer-events: all !important; }

    #logoDraggable {
      position: absolute; cursor: grab;
      user-select: none; touch-action: none;
      pointer-events: all; display: none; overflow: visible;
      background: transparent;  /* ensures the hit area covers the full box */
    }
    #logoDraggable:active { cursor: grabbing; }

    #logoImg {
      display: none; width: 100%; height: 100%;
      object-fit: contain; pointer-events: all; position: relative; z-index: 1;
    }
    #logoPlaceholder {
      position: absolute; inset: 0; z-index: 1;
      border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.15); pointer-events: all;
    }

    #logoTitle {
      display: none;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      font-weight: 700; text-transform: uppercase;
      white-space: nowrap; line-height: 1; letter-spacing: 0.06em;
    }

    .play-area-label {
      font-size: 10px; color: #252525;
      letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 700; pointer-events: none; transition: opacity 0.3s;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .play-area-label.hidden { opacity: 0; }

    /* ════════════ PLAY CONTROLS BAR ════════════ */
    .play-controls-bar {
      display: flex; align-items: center; gap: 8px;
      padding-top: 6px; flex-wrap: nowrap;
    }
    .orient-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      background: #1a1a1a; color: #777;
      border: 1px solid #2a2a2a; border-radius: 20px;
      cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .orient-btn:hover { border-color: #666; color: #ccc; }

    /* Scale strip — logo + optional text slider in one row */
    .scale-strip { display: none; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .scale-strip.visible { display: flex; }
    .scale-lbl {
      font-size: 10px; color: #555; white-space: nowrap;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif; flex-shrink: 0;
    }
    .scale-val {
      font-size: 10px; color: #444; white-space: nowrap; min-width: 26px;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif; text-align: right; flex-shrink: 0;
    }
    .scale-divider { color: #333; font-size: 12px; flex-shrink: 0; padding: 0 2px; }
    .scale-strip input[type=range] { flex: 1; accent-color: #fff; min-width: 40px; }

    .orient-info {
      font-size: 10px; color: #3a3a3a; font-family: monospace;
      margin-left: auto; white-space: nowrap; flex-shrink: 0;
    }

    /* ════════════ SECTIONS ════════════ */
    .section {
      margin-bottom: 6px; border: 1px solid #222;
      border-radius: 10px; overflow: hidden; transition: opacity 0.25s;
    }
    .section.locked { opacity: 0.25; pointer-events: none; }

    .section-header {
      display: flex; align-items: center; gap: 8px; padding: 9px 13px;
      cursor: pointer; background: #181818;
      transition: background 0.15s; user-select: none;
    }
    .section-header:hover { background: #1e1e1e; }
    .section.locked .section-header { cursor: default; }
    .section.locked .section-header:hover { background: #181818; }

    .step-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: #444;
      background: #1f1f1f; border-radius: 4px; padding: 2px 7px;
      text-transform: uppercase; flex-shrink: 0; transition: all 0.2s;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif; border: 1px solid #2a2a2a;
    }
    .step-badge.active { background: #fff; color: #111; border-color: #fff; }
    .step-badge.done   { background: #1a1a1a; color: #3a3a3a; border-color: #222; }

    .section-title {
      font-size: 12px; font-weight: 700; color: #3a3a3a;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: color 0.2s; flex: 1;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .section-title.active { color: #aaa; }
    .section-title.done   { color: #3a3a3a; }

    .section-summary {
      font-size: 10px; color: #555; letter-spacing: 0.06em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
    }
    .collapse-arrow {
      color: #333; flex-shrink: 0; transition: transform 0.25s, color 0.2s;
      display: flex; align-items: center;
    }
    .section.active .collapse-arrow { color: #666; }
    .section.open   .collapse-arrow { transform: rotate(180deg); }

    .section-body { padding: 10px 12px; display: none; }
    .section.open .section-body { display: block; }

    /* ════════════ BASE CATEGORY BUTTONS ════════════ */
    .base-choices { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }
    .base-choice {
      position: relative; border-radius: 7px; overflow: hidden;
      cursor: pointer; border: 2px solid #252525; transition: all 0.15s;
      aspect-ratio: 3/2;
    }
    .base-choice:hover { border-color: #666; }
    .base-choice.selected { border-color: #fff; }
    /* After choosing a category, dim the non-selected ones slightly */
    .base-choices.has-selection .base-choice:not(.selected) { opacity: 0.45; }
    .base-choices.has-selection .base-choice:not(.selected):hover { opacity: 0.8; }

    .ph-bg { width: 100%; height: 100%; }
    .ph-bg.tropical { background: linear-gradient(135deg,#1a3a1a,#3a6a2a); }
    .ph-bg.water    { background: linear-gradient(135deg,#0a1a3a,#1a4a7a); }
    .ph-bg.body     { background: linear-gradient(135deg,#2a1515,#5a2a2a); }
    .base-choice .choice-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent,rgba(0,0,0,0.85));
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      color: #fff; text-align: center; padding: 10px 6px 5px;
      text-transform: uppercase; font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }

    /* ════════════ PICKER LABEL ════════════ */
    .picker-label {
      font-size: 10px; color: #555; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 6px;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }

    /* ════════════ IMAGE GRIDS ════════════ */
    .grid-5x2 { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; }
    .grid-5x2 .img-tile { aspect-ratio: 16/10; }
    .grid-4x4 { display: grid; grid-template-columns: repeat(5,1fr); gap: 3px; }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .img-tile {
      aspect-ratio: 1; border-radius: 6px; border: 2px solid #1e1e1e;
      cursor: pointer; overflow: hidden; position: relative;
      transition: border-color 0.15s;
      background: linear-gradient(90deg, #181818 25%, #222 50%, #181818 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 2px;
    }
    /* Stop shimmer once an img child has loaded */
    .img-tile:has(img[src]:not([src=""])) { animation: none; background: #181818; }
    .img-tile:hover  { border-color: #666; }
    .img-tile.selected { border-color: #fff; }
    .img-tile .t-num {
      font-size: 10px; font-weight: 700; color: #2a2a2a;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif; line-height: 1;
    }
    .img-tile .t-lbl {
      font-size: 6px; color: #2a2a2a; letter-spacing: 0.1em;
      text-transform: uppercase; font-weight: 600;
    }
    .img-tile.defocus { background: radial-gradient(ellipse,#0e0e22,#080810); }
    .img-tile.defocus .t-num, .img-tile.defocus .t-lbl { color: #26264a; }
    .img-tile.pinkvec { background: radial-gradient(ellipse,#180a18,#0d040d); }
    .img-tile.pinkvec .t-num, .img-tile.pinkvec .t-lbl { color: #3a1540; }

    /* ════════════ STEP 2 DIVIDERS ════════════ */
    .el-divider {
      font-size: 9px; font-weight: 700; color: #3a3a3a; letter-spacing: 0.14em;
      text-transform: uppercase; display: flex; align-items: center; gap: 8px;
      margin: 10px 0 6px; font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .el-divider::after { content: ''; flex: 1; height: 1px; background: #222; }
    .body-note { font-size: 10px; color: #444; margin-bottom: 8px; font-style: italic; }

    /* ════════════ LOGO SECTION ════════════ */
    .logo-ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .ctrl-lbl {
      font-size: 10px; color: #555; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }

    .tgl-group { display: flex; border: 1px solid #252525; border-radius: 6px; overflow: hidden; }
    .tgl {
      font-size: 10px; font-weight: 700; padding: 4px 11px;
      background: #1a1a1a; color: #555; border: none; cursor: pointer;
      letter-spacing: 0.07em; transition: all 0.12s;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .tgl:not(:last-child) { border-right: 1px solid #222; }
    .tgl:hover { color: #aaa; }
    .tgl.on-w { background: #fff;    color: #111; }
    .tgl.on-b { background: #111;    color: #fff; border: 1px solid #555; }
    .tgl.on-p { background: #ff30ff; color: #fff; }
    .tgl.on   { background: #fff;    color: #111; }

    .logo-sub {
      font-size: 9px; font-weight: 700; color: #3a3a3a; letter-spacing: 0.14em;
      text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin: 8px 0 6px;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .logo-sub::after { content: ''; flex: 1; height: 1px; background: #222; }

    .logo-grid-6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; }

    .logo-tile {
      aspect-ratio: 1; border-radius: 6px; border: 2px solid #1e1e1e;
      cursor: pointer; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s; background: #181818; position: relative;
    }
    .logo-tile:hover  { border-color: #666; }
    .logo-tile.selected { border-color: #fff; }
    .logo-tile.bg-blk { background: #000; }
    .logo-tile.bg-pnk { background: #130013; }
    .logo-tile .tile-in {
      font-size: 7px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; text-align: center; color: #2a2a2a;
      padding: 4px; line-height: 1.4; font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .logo-tile.c-w .tile-in { color: rgba(255,255,255,0.2); }
    .logo-tile.c-b .tile-in { color: rgba(255,255,255,0.12); }
    .logo-tile.c-p .tile-in { color: rgba(255,48,255,0.3); }
    .logo-tile img { width: 70%; height: 70%; object-fit: contain; pointer-events: none; display: block; }

    .logo-tile.upload-tile {
      border-style: dashed; border-color: #2a2a2a; flex-direction: column; gap: 4px;
    }
    .logo-tile.upload-tile:hover { border-color: #666; }
    .up-icon { color: #3a3a3a; transition: color 0.15s; display: block; }
    .logo-tile.upload-tile:hover .up-icon { color: #999; }
    .up-lbl {
      font-size: 7px; font-weight: 700; color: #3a3a3a; letter-spacing: 0.1em;
      text-transform: uppercase; transition: color 0.15s;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
    }
    .logo-tile.upload-tile:hover .up-lbl { color: #999; }
    .logo-tile.upload-tile.has-upload { border-style: solid; border-color: #555; }
    #uploadPreview { width: 85%; height: 85%; object-fit: contain; display: none; }
    .logo-tile.upload-tile.has-upload .up-icon,
    .logo-tile.upload-tile.has-upload .up-lbl { display: none; }
    #uploadInput { display: none; }

    /* ════════════ TITLE CHOOSER ════════════ */
    .title-chooser {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid #222; display: none;
    }
    .title-chooser.visible { display: block; }

    .title-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-top: 6px;
    }
    .title-chip {
      padding: 5px 3px; border-radius: 5px; border: 1px solid #222;
      cursor: pointer;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      font-size: 10px; font-weight: 700;
      text-align: center; color: #555;
      background: #181818; transition: all 0.14s;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .title-chip:hover   { border-color: #666; color: #bbb; }
    .title-chip.selected { border-color: #fff; color: #fff; background: #1e1e1e; }
    .title-chip.none-chip { font-size: 9px; letter-spacing: 0.1em; color: #3a3a3a; }
    .title-chip.none-chip.selected { color: #aaa; }

    /* ════════════ ACTION BUTTONS ════════════ */
    .play-area-btns {
      position: absolute;
      right: 10px;
      bottom: 46px;
      z-index: 20;
      display: flex; align-items: center; gap: 8px;
    }

    /* Tooltip wrapper for gen button */
    .gen-btn-wrap {
      position: relative; display: inline-flex;
    }
    .gen-btn-wrap .gen-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      white-space: nowrap;
      background: rgba(20,20,20,0.95);
      color: rgba(255,255,255,0.75);
      font-size: 10px; font-weight: 600;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      letter-spacing: 0.07em;
      padding: 5px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .gen-btn-wrap .gen-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; right: 14px;
      border: 5px solid transparent;
      border-top-color: rgba(20,20,20,0.95);
    }
    .gen-btn-wrap.body-locked:hover .gen-tooltip { display: block; }

    /* Base button style — disabled/waiting state */
    .gen-btn {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 9px 20px; border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; transition: all 0.18s;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.25);
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .gen-btn:disabled { cursor: not-allowed; }

    /* Remix: violet/purple pill */
    .gen-btn.ready {
      background: linear-gradient(135deg, rgba(140,80,255,0.92), rgba(100,40,220,0.96));
      color: #fff; border-color: rgba(180,120,255,0.4);
      box-shadow: 0 3px 20px rgba(120,60,220,0.5);
    }
    .gen-btn.ready:hover {
      background: linear-gradient(135deg, rgba(155,95,255,0.98), rgba(115,55,235,1));
      transform: translateY(-1px);
      box-shadow: 0 5px 28px rgba(120,60,220,0.65);
    }

    /* ↺ Remix after generation: faded violet */
    .gen-btn.regenerate {
      background: rgba(80,30,160,0.45); color: rgba(200,160,255,0.7);
      border-color: rgba(160,100,255,0.25);
    }
    .gen-btn.regenerate:hover {
      background: rgba(100,40,180,0.6); color: rgba(220,180,255,0.9);
      border-color: rgba(180,120,255,0.45);
      transform: translateY(-1px);
    }

    .gen-btn.running {
      background: rgba(60,20,130,0.7); color: rgba(200,160,255,0.6);
      cursor: wait; border-color: rgba(160,100,255,0.2);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

    /* Export Image: solid white, clearly actionable */
    .export-btn {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 9px 20px; border-radius: 24px;
      border: 2px solid #fff;
      cursor: pointer; transition: all 0.18s;
      background: #fff;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #111;
      font-family: 'Trebuchet MS', Trebuchet, sans-serif;
      display: none; white-space: nowrap;
      box-shadow: 0 3px 18px rgba(0,0,0,0.45);
    }
    .export-btn.show { display: block; }
    .export-btn.show:hover {
      background: #f5f5f5; transform: translateY(-1px);
      box-shadow: 0 5px 24px rgba(0,0,0,0.55);
    }

    /* Keep old action-area for any leftover references but hide it */
    .action-area { display: none; }

    @media (max-width:560px) {
      body { padding: 0 0.5rem 4rem; }

      /* Play area: portrait narrower on small screens */
      .play-area-outer.portrait { width: 160px; }

      /* Controls bar: wrap to two lines gracefully */
      .play-controls-bar { flex-wrap: wrap; gap: 5px; }
      .orient-info { display: none; } /* hide resolution label on mobile */
      .scale-strip { min-width: 100px; }

      /* Sections */
      .section-body { padding: 8px 10px; }
      .section-header { padding: 8px 10px; gap: 6px; }
      .section-title { font-size: 10px; }
      .section-summary { max-width: 100px; font-size: 9px; }

      /* Base category buttons: slightly shorter */
      .base-choices { gap: 4px; }

      /* Image grids: fewer columns */
      .grid-5x2 { grid-template-columns: repeat(4,1fr); gap: 3px; }
      .grid-4x4 { grid-template-columns: repeat(4,1fr); gap: 3px; }

      /* Logo grid: 3 cols on mobile (was 6) */
      .logo-grid-6 { grid-template-columns: repeat(3,1fr); }

      /* Title chips */
      .title-grid { grid-template-columns: repeat(3,1fr); gap: 3px; }
      .title-chip { font-size: 9px; padding: 4px 2px; }

      /* Overlay buttons: smaller text/padding */
      .gen-btn, .export-btn { font-size: 11px; padding: 7px 14px; }
      .play-area-btns { gap: 5px; right: 6px; bottom: 42px; }

      /* Toggle groups: slightly smaller */
      .tgl { font-size: 9px; padding: 4px 8px; }
    }

    @media (max-width:380px) {
      .grid-5x2 { grid-template-columns: repeat(3,1fr); }
      .logo-grid-6 { grid-template-columns: repeat(3,1fr); }
      .gen-btn, .export-btn { font-size: 10px; padding: 6px 10px; }
      .section-title { font-size: 9px; letter-spacing: 0.07em; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     STICKY PLAY AREA
═══════════════════════════════════════════ -->
<div class="sticky-top">
  <div class="play-area-outer landscape" id="playAreaOuter">
    <div class="version" id="versionTag" style="position:absolute;top:8px;left:10px;z-index:20;pointer-events:none;">v8.5 · FOAMS Image Generator</div>
    <div class="play-area-inner" id="playAreaInner">

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const TITLES_PT = ['CASA','ESPAÇO','NÚCLEO','ESTÚDIOS','COLETIVO','RESIDÊNCIA','LABORATÓRIO','RESISTÊNCIA'];
const TITLES_EN = ['HOUSE','SPACE','HUB','STUDIOS','COLLECTIVE','RESIDENCY','LABORATORY','RESISTANCE'];

function logoFilename(color, n) {
  return `foams-${color}-on-transparent-variation-0${n}.png`;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let orientation  = 'landscape';
let selCat       = null;
let selBaseImg   = null;
let selEl        = null;
let selLogo      = null;   // 'upload' | 'preset-N'
let selBaseFile  = null;   // actual filename of chosen base image
let uploadedSrc  = null;
let logoColor    = 'white';
let titleLang    = 'PT';
let selTitle     = null;   // word string (already uppercased) or null
let imgGenerated = false;
let generatedImageUrl = null;  // stores the last generated image for export
// Generated (remixed) image transform state
let genX = 0, genY = 0, genW = 0, genH = 0, genScale = 1.0, genRot = 0;
let genDragging = false, genDragOffX = 0, genDragOffY = 0;
let genScaling  = false, genScaleStartDist = 0, genScaleStart = 1.0;
let genSelected = false;

// Graphical element transform state (all relative to play-area)
let elX = 0, elY = 0;       // center position in play-area px
let elW = 0, elH = 0;       // natural size in play-area px (set on load)
let elScale = 1.0;           // scale multiplier
let elRot = 0;               // rotation in degrees
let elFile = '';             // current element filename
let elFlipX = false;  // mirror state for graphical element
let elDragging = false, elDragOffX = 0, elDragOffY = 0;
let elRotating = false, elRotStartAngle = 0, elRotStartRot = 0;
let elScaling = false, elScaleCorner = '', elScaleStartDist = 0, elScaleStart = 1.0;
let elSelected = false;  // whether el transform handles are shown

// Base image transform state
let bgX = 0, bgY = 0, bgW = 0, bgH = 0, bgScale = 1.0, bgRot = 0;
let bgDragging = false, bgDragOffX = 0, bgDragOffY = 0;
let bgRotating = false, bgRotStartAngle = 0, bgRotStartRot = 0;
let bgScaling  = false, bgScaleStartDist = 0, bgScaleStart = 1.0;
let bgSelected = false;  // whether bg transform handles are shown

let logoPctX = 26, logoPctY = 70;  // center of logo as % of play-area
let logoScale = 55;                 // % of min(aW,aH) — kept for export math
let dragging = false, dOffX = 0, dOffY = 0;

// Logo transform (mirrors elX/elY system — position in play-area px)
let logoTX = 0, logoTY = 0;      // center in play-area px
let logoTW = 0, logoTH = 0;      // natural size of the logo img in play-area px
let logoTScale = 1.0;
let logoTRot   = 0;
let logoSelected = false;
let logoDragging2 = false, logoDragOff2X = 0, logoDragOff2Y = 0;
let logoRotating2 = false, logoRotStart2 = 0, logoRotStartRot2 = 0;
let logoScaling2  = false, logoScaleStart2Dist = 0, logoScaleStart2 = 1.0;

// Title transform state — independent element in play-area coords
let titleTX = 0, titleTY = 0;          // center in play-area px
let titleTW = 0, titleTH = 0;          // natural size of title text in px
let titleTScale = 1.0;                  // scale multiplier
let titleTRot   = 0;                    // rotation degrees
let titleSelected = false;
let titleDragging2 = false, titleDragOff2X = 0, titleDragOff2Y = 0;
let titleRotating2 = false, titleRotStart2 = 0, titleRotStartRot2 = 0;
let titleScaling2  = false, titleScaleStart2Dist = 0, titleScaleStart2 = 1.0;

// Legacy (kept for compat)
let titleManuallyMoved = false;
let titleDragging = false, tOffX = 0, tOffY = 0;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function $id(id) { return document.getElementById(id); }

// ─── GENERATED IMAGE TRANSFORM ───────────────────────────────────────────────
function applyGenTransform() {
  const gi = $id('bgImage');
  const gh = $id('genHandles');
  if (!gi || gi.style.display === 'none') return;
  const w = genW * genScale, h = genH * genScale;
  gi.style.width  = w + 'px'; gi.style.height = h + 'px';
  gi.style.left   = (genX - w/2) + 'px'; gi.style.top = (genY - h/2) + 'px';
  gi.style.transform = `rotate(${genRot}deg)`;
  if (gh && genSelected) {
    gh.style.width  = w + 'px'; gh.style.height  = h + 'px';
    gh.style.left   = (genX - w/2) + 'px'; gh.style.top = (genY - h/2) + 'px';
    gh.style.transform = `rotate(${genRot}deg)`;
  }
}

// ─── TITLE TRANSFORM ─────────────────────────────────────────────────────────
// Measure and lock title size — only called when font changes, not during drag
function measureTitleSize() {
  const titleEl = $id('logoTitle');
  const td = $id('titleDraggable');
  if (!titleEl || !td) return;
  // Temporarily make visible off-screen to measure
  const prevLeft = td.style.left, prevTop = td.style.top;
  td.style.left = '-9999px'; td.style.top = '-9999px';
  td.style.width = 'auto'; td.style.height = 'auto';
  const w = titleEl.offsetWidth  || 80;
  const h = titleEl.offsetHeight || 20;
  td.style.left = prevLeft; td.style.top = prevTop;
  titleTW = w; titleTH = h;
}

function applyTitleStyle_font() {
  const titleEl = $id('logoTitle');
  if (!titleEl) return;
  const baseFontPx = (logoTW > 0 ? logoTW * logoTScale : 80) * 0.08;
  const fontSize   = Math.max(4, Math.round(baseFontPx * titleTScale));
  titleEl.style.fontSize   = fontSize + 'px';
  titleEl.style.whiteSpace = 'nowrap';
  titleEl.style.fontFamily = "'Trebuchet MS', Trebuchet, sans-serif";
  titleEl.style.fontWeight = '700';
  titleEl.style.textTransform = 'uppercase';
  titleEl.style.letterSpacing = '0.06em';
  const colorMap = { white:'#ffffff', black:'#000000', pink:'#ff30ff' };
  titleEl.style.color = colorMap[logoColor] || '#ffffff';
}

function applyTitleTransform(remeasure) {
  const td = $id('titleDraggable');
  const th = $id('titleHandles');
  if (!td || td.style.display === 'none') return;

  // Update font styles
  applyTitleStyle_font();

  // Only remeasure size when explicitly requested (font/scale change), not during drag
  if (remeasure || !titleTW) {
    measureTitleSize();
  }
  const w = titleTW || 80;
  const h = titleTH || 20;

  // Position using locked size — stable during drag
  td.style.width           = w + 'px';
  td.style.height          = h + 'px';
  td.style.left            = (titleTX - w/2) + 'px';
  td.style.top             = (titleTY - h/2) + 'px';
  td.style.transform       = `rotate(${titleTRot}deg)`;
  td.style.transformOrigin = 'center center';

  if (th && titleSelected) {
    th.style.width     = w + 'px'; th.style.height  = h + 'px';
    th.style.left      = (titleTX - w/2) + 'px'; th.style.top = (titleTY - h/2) + 'px';
    th.style.transform = `rotate(${titleTRot}deg)`;
    th.style.transformOrigin = 'center center';
  }
}

function showTitleInPlayArea() {
  const td = $id('titleDraggable');
  if (!td || !selTitle) return;
  const titleEl = $id('logoTitle');
  if (titleEl) {
    titleEl.style.display = 'block';
    titleEl.textContent   = selTitle;
  }
  td.style.display = 'block';

  // Default position: relative to logo if logo is shown
  const area = $id('playAreaInner');
  const aW = area.offsetWidth, aH = area.offsetHeight;
  if (titleTX === 0 && titleTY === 0) {
    // First time only — position near logo edge
    const logoSW = logoTW * logoTScale;
    const logoSH = logoTH * logoTScale;
    if (titleLang === 'PT') {
      // PT (CASA): just above the logo, slightly left of center
      titleTX = logoTX - logoSW * 0.15;
      titleTY = logoTY - logoSH * 0.5 - 8;   // just above top edge
    } else {
      // EN (HOUSE): just below the logo, slightly right of center
      titleTX = logoTX + logoSW * 0.15;
      titleTY = logoTY + logoSH * 0.5 + 8;   // just below bottom edge
    }
    titleTScale = 1.0; titleTRot = 0;
  }
  applyTitleTransform(true);  // remeasure on first show
}

function hideTitleTransform() {
  const td = $id('titleDraggable');
  const th = $id('titleHandles');
  if (td) td.style.display = 'none';
  if (th) th.style.display = 'none';
  titleSelected = false;
  // titleTW preserved — position kept when changing word
}

// When logo moves, shift title by same delta
function shiftTitleWithLogo(deltaX, deltaY) {
  titleTX += deltaX;
  titleTY += deltaY;
  if ($id('titleDraggable')?.style.display !== 'none') applyTitleTransform(false);
}

// ─── LOGO TRANSFORM ──────────────────────────────────────────────────────────
function applyLogoTransform() {
  const ld = $id('logoDraggable');
  const lh = $id('logoHandles');
  if (!ld || ld.style.display === 'none') return;

  // Scaled size in actual screen px
  const sw = logoTW * logoTScale;
  const sh = logoTH * logoTScale;

  // Position box: top-left at (logoTX - sw/2, logoTY - sh/2)
  // Rotation around center
  ld.style.width          = sw + 'px';
  ld.style.height         = sh + 'px';
  ld.style.left           = (logoTX - sw/2) + 'px';
  ld.style.top            = (logoTY - sh/2) + 'px';
  ld.style.transform      = `rotate(${logoTRot}deg)`;
  ld.style.transformOrigin = 'center center';

  // Sync % coords for export
  const area = $id('playAreaInner');
  const aW = area.offsetWidth, aH = area.offsetHeight;
  if (aW && aH) {
    logoPctX = (logoTX / aW) * 100;
    logoPctY = (logoTY / aH) * 100;
    logoScale = (sw / Math.min(aW, aH)) * 100;
  }

  // Sync handles
  if (lh && logoSelected) {
    lh.style.width          = sw + 'px';
    lh.style.height         = sh + 'px';
    lh.style.left           = (logoTX - sw/2) + 'px';
    lh.style.top            = (logoTY - sh/2) + 'px';
    lh.style.transform      = `rotate(${logoTRot}deg)`;
    lh.style.transformOrigin = 'center center';
  }

  // Title position handled by titleDraggable, not here
}

function toggleMirror() {
  elFlipX = !elFlipX;
  const btn = $id('mirrorBtn');
  if (btn) btn.style.color = elFlipX ? '#7af' : 'rgba(255,255,255,0.8)';
  applyElTransform();
}

// ─── BASE IMAGE TRANSFORM ─────────────────────────────────────────────────────
function applyBgTransform() {
  const bp = $id('basePreview');
  const bh = $id('bgHandles');
  if (!bp || bp.style.display === 'none') return;
  const w = bgW * bgScale, h = bgH * bgScale;
  bp.style.width  = w + 'px';
  bp.style.height = h + 'px';
  bp.style.left   = (bgX - w/2) + 'px';
  bp.style.top    = (bgY - h/2) + 'px';
  bp.style.transform = `rotate(${bgRot}deg)`;
  if (bh && bgSelected) {
    bh.style.width  = w + 'px'; bh.style.height  = h + 'px';
    bh.style.left   = (bgX - w/2) + 'px'; bh.style.top = (bgY - h/2) + 'px';
    bh.style.transform = `rotate(${bgRot}deg)`;
  }
}

// ─── ELEMENT TRANSFORM ───────────────────────────────────────────────────────
function applyElTransform() {
  const ep = $id('elPreview');
  const eh = $id('elHandles');
  if (!ep || ep.style.display === 'none') return;

  const w = elW * elScale;
  const h = elH * elScale;

  // Position and transform the element image
  ep.style.width  = w + 'px';
  ep.style.height = h + 'px';
  ep.style.left   = (elX - w/2) + 'px';
  ep.style.top    = (elY - h/2) + 'px';
  // Rotate first, then flip — keeps rotation direction consistent with handles
  ep.style.transform = elFlipX ? `rotate(${elRot}deg) scaleX(-1)` : `rotate(${elRot}deg)`;

  // Sync the dashed handles box
  if (eh) {
    eh.style.width   = w + 'px';
    eh.style.height  = h + 'px';
    eh.style.left    = (elX - w/2) + 'px';
    eh.style.top     = (elY - h/2) + 'px';
    eh.style.transform = `rotate(${elRot}deg)`;
  }
}

// ─── TRANSFORM SYSTEM (base image + graphical element) ──────────────────────
(function initTransforms() {
  function xy(e) {
    return e.touches
      ? {x: e.touches[0].clientX, y: e.touches[0].clientY}
      : {x: e.clientX, y: e.clientY};
  }

  function selectEl() {
    elSelected=true; bgSelected=false; logoSelected=false;
    const eh=$id('elHandles'); if(eh) eh.style.display='block';

    const lh=$id('logoHandles'); if(lh) lh.style.display='none';
    applyElTransform();
  }
  function selectBg() { /* base image is static, no selection */ }
  function selectLogo() {
    logoSelected=true; elSelected=false; bgSelected=false;
    const lh=$id('logoHandles'); if(lh){ lh.style.display='block'; applyLogoTransform(); }
    const eh=$id('elHandles'); if(eh) eh.style.display='none';

  }
  function deselect() {
    elSelected=false; bgSelected=false; logoSelected=false;
    const eh=$id('elHandles'); if(eh) eh.style.display='none';

    const lh=$id('logoHandles'); if(lh) lh.style.display='none';
  }

  // Expose deselect for external use
  window.deselectAll = deselect;

  document.addEventListener('mousedown', onDown);
  document.addEventListener('touchstart', onDown, {passive:false});

  function onDown(e) {
    const ep = $id('elPreview');
    const bp = $id('basePreview');
    const p  = xy(e);
    const ld = $id('logoDraggable');
    const gi = $id('bgImage');
    const isGenHandle   = e.target.classList.contains('gen-handle');
    const isGen         = gi && gi.style.display !== 'none' && gi.src && e.target === gi;
    const td            = $id('titleDraggable');
    const isTitleHandle = e.target.classList.contains('title-handle');
    const isTitleRot    = e.target.id === 'titleRotHandle';
    const isTitleDrag   = !!(td && td.style.display !== 'none' && td.contains(e.target) && !isTitleHandle && !isTitleRot);
    const isElHandle    = e.target.classList.contains('el-handle');
    const isElRot       = e.target.id === 'rotHandle';
    const isBgHandle    = false;  // no bg handles
    const isBgRot       = false;  // no bg rotation
    const isLogoHandle  = e.target.classList.contains('logo-handle');
    const isLogoRot     = e.target.id === 'logoRotHandle';
    const isEl          = ep && ep.style.display !== 'none' && e.target === ep;
    const isBg          = false;  // base image is now static, no transform
    const titleEl_      = $id('logoTitle');
    const isTitle       = titleEl_ && e.target === titleEl_;
    const isDragSurface = e.target.id === 'logoDragSurface';
    const isLogo        = ld && ld.style.display !== 'none' &&
                          (e.target === ld || isDragSurface || (ld.contains(e.target) && !isTitle)) &&
                          !isLogoHandle && !isLogoRot;

    // ── Click on element → select it ──
    if (isEl) {
      e.preventDefault(); e.stopPropagation();
      selectEl();
      elDragging = true;
      const r = ep.getBoundingClientRect();
      elDragOffX = p.x - (r.left + r.width/2);
      elDragOffY = p.y - (r.top  + r.height/2);
      return;
    }

    // ── Click on base image → select it ──
    if (isBg) {
      e.preventDefault(); e.stopPropagation();
      selectBg();
      bgDragging = true;
      const r = bp.getBoundingClientRect();
      bgDragOffX = p.x - (r.left + r.width/2);
      bgDragOffY = p.y - (r.top  + r.height/2);
      return;
    }

    // ── El rotate handle ──
    if (isElRot) {
      e.preventDefault(); e.stopPropagation();
      elRotating = true;
      const r  = ep.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      elRotStartAngle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      elRotStartRot   = elRot;
      return;
    }

    // ── Bg rotate handle ──
    if (isBgRot) {
      e.preventDefault(); e.stopPropagation();
      bgRotating = true;
      const r  = bp.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      bgRotStartAngle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      bgRotStartRot   = bgRot;
      return;
    }

    // ── Click on generated image → select + drag (portrait only) ──
    if (isGen && orientation === 'portrait') {
      e.preventDefault(); e.stopPropagation();
      genSelected = true;
      const gh = $id('genHandles');
      if (gh) { gh.style.display = 'block'; applyGenTransform(); }
      genDragging = true;
      const r = gi.getBoundingClientRect();
      genDragOffX = p.x - (r.left + r.width/2);
      genDragOffY = p.y - (r.top  + r.height/2);
      return;
    }

    // ── Gen image corner handle (portrait only) ──
    if (isGenHandle && orientation === 'portrait') {
      e.preventDefault(); e.stopPropagation();
      genScaling = true;
      const r  = gi.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      genScaleStartDist = Math.hypot(p.x - cx, p.y - cy);
      genScaleStart = genScale;
      return;
    }

    // ── Click on title → select + drag ──
    if (isTitleDrag) {
      e.preventDefault(); e.stopPropagation();
      titleSelected = true; elSelected=false; bgSelected=false; logoSelected=false; genSelected=false;
      const th = $id('titleHandles'); if (th) { th.style.display='block'; applyTitleTransform(); }
      const eh=$id('elHandles'); if(eh) eh.style.display='none';
      const bh=$id('bgHandles'); if(bh) bh.style.display='none';
      const lh=$id('logoHandles'); if(lh) lh.style.display='none';
      const gh=$id('genHandles'); if(gh) gh.style.display='none';
      titleDragging2 = true;
      // Offset = mouse position relative to play area, minus title center
      // titleTX/TY are already in play-area px — no getBoundingClientRect needed
      const _ar = $id('playAreaInner').getBoundingClientRect();
      titleDragOff2X = (p.x - _ar.left) - titleTX;
      titleDragOff2Y = (p.y - _ar.top)  - titleTY;
      return;
    }

    // ── Title rotate handle ──
    if (isTitleRot) {
      e.preventDefault(); e.stopPropagation();
      titleRotating2 = true;
      const r  = td.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      titleRotStart2    = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      titleRotStartRot2 = titleTRot;
      return;
    }

    // ── Title corner handle ──
    if (isTitleHandle) {
      e.preventDefault(); e.stopPropagation();
      titleScaling2 = true;
      const r  = td.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      titleScaleStart2Dist = Math.hypot(p.x - cx, p.y - cy);
      titleScaleStart2     = titleTScale;
      return;
    }

    // ── Click on logo → select + drag ──
    if (isLogo) {
      e.preventDefault(); e.stopPropagation();
      selectLogo();
      logoDragging2 = true;
      const r = ld.getBoundingClientRect();
      logoDragOff2X = p.x - (r.left + r.width/2);
      logoDragOff2Y = p.y - (r.top  + r.height/2);
      return;
    }

    // ── Logo rotate handle ──
    if (isLogoRot) {
      e.preventDefault(); e.stopPropagation();
      logoRotating2 = true;
      const r  = ld.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      logoRotStart2    = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      logoRotStartRot2 = logoTRot;
      return;
    }

    // ── Logo corner handle ──
    if (isLogoHandle) {
      e.preventDefault(); e.stopPropagation();
      logoScaling2 = true;
      const r  = ld.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      logoScaleStart2Dist = Math.hypot(p.x - cx, p.y - cy);
      logoScaleStart2     = logoTScale;
      return;
    }

    // ── El corner handle ──
    if (isElHandle) {
      e.preventDefault(); e.stopPropagation();
      elScaling = true;
      const r  = ep.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      elScaleStartDist = Math.hypot(p.x - cx, p.y - cy);
      elScaleStart = elScale;
      return;
    }

    // ── Bg corner handle ──
    if (isBgHandle) {
      e.preventDefault(); e.stopPropagation();
      bgScaling = true;
      const r  = bp.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      bgScaleStartDist = Math.hypot(p.x - cx, p.y - cy);
      bgScaleStart = bgScale;
      return;
    }

    // ── Click on play area background → deselect ──
    // Don't deselect if clicking on the mirror button or any button inside handles
    const area = $id('playAreaInner');
    if (area && area.contains(e.target) && e.target.tagName !== 'BUTTON') {
      deselect();
      genSelected = false;
      const gh2 = $id('genHandles'); if(gh2) gh2.style.display='none';
      titleSelected = false;
      const th2 = $id('titleHandles'); if(th2) th2.style.display='none';
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});

  function onMove(e) {
    const anyActive = elDragging || elRotating || elScaling || bgDragging || bgRotating || bgScaling || logoDragging2 || logoRotating2 || logoScaling2 || genDragging || genScaling || titleDragging2 || titleRotating2 || titleScaling2;
    if (!anyActive) return;
    e.preventDefault();
    const p  = xy(e);
    const area = $id('playAreaInner');
    const ar   = area.getBoundingClientRect();

    if (elDragging) {
      elX = p.x - ar.left - elDragOffX;
      elY = p.y - ar.top  - elDragOffY;
      applyElTransform();
    }
    if (bgDragging) {
      bgX = p.x - ar.left - bgDragOffX;
      bgY = p.y - ar.top  - bgDragOffY;
      applyBgTransform();
    }
    if (elRotating) {
      const ep = $id('elPreview'), r = ep.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const angle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      elRot = elRotStartRot + (angle - elRotStartAngle);
      applyElTransform();
    }
    if (bgRotating) {
      const bp = $id('basePreview'), r = bp.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const angle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      bgRot = bgRotStartRot + (angle - bgRotStartAngle);
      applyBgTransform();
    }
    if (elScaling) {
      const ep = $id('elPreview'), r = ep.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      elScale = Math.max(0.05, elScaleStart * (Math.hypot(p.x-cx, p.y-cy) / elScaleStartDist));
      applyElTransform();
    }
    if (bgScaling) {
      const bp = $id('basePreview'), r = bp.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      bgScale = Math.max(0.05, bgScaleStart * (Math.hypot(p.x-cx, p.y-cy) / bgScaleStartDist));
      applyBgTransform();
    }
    if (titleDragging2) {
      titleTX = p.x - ar.left - titleDragOff2X;
      titleTY = p.y - ar.top  - titleDragOff2Y;
      applyTitleTransform(false);  // no remeasure during drag
    }
    if (titleRotating2) {
      const td2 = $id('titleDraggable'), r = td2.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const angle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      titleTRot = titleRotStartRot2 + (angle - titleRotStart2);
      applyTitleTransform();
    }
    if (titleScaling2) {
      const td2 = $id('titleDraggable'), r = td2.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      titleTScale = Math.max(0.1, titleScaleStart2 * (Math.hypot(p.x-cx, p.y-cy) / titleScaleStart2Dist));
      applyTitleTransform(true);  // remeasure — font size changed
    }
    if (genDragging) {
      genX = p.x - ar.left - genDragOffX;
      genY = p.y - ar.top  - genDragOffY;
      applyGenTransform();
    }
    if (genScaling) {
      const gi2 = $id('bgImage'), r = gi2.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      genScale = Math.max(0.05, genScaleStart * (Math.hypot(p.x-cx, p.y-cy) / genScaleStartDist));
      applyGenTransform();
    }
    if (logoDragging2) {
      const prevLX = logoTX, prevLY = logoTY;
      logoTX = p.x - ar.left - logoDragOff2X;
      logoTY = p.y - ar.top  - logoDragOff2Y;
      applyLogoTransform();
      // Title follows logo drag
      if ($id('titleDraggable')?.style.display !== 'none') {
        shiftTitleWithLogo(logoTX - prevLX, logoTY - prevLY);
      }
    }
    if (logoRotating2) {
      const ld = $id('logoDraggable'), r = ld.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const angle = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI;
      logoTRot = logoRotStartRot2 + (angle - logoRotStart2);
      applyLogoTransform();
    }
    if (logoScaling2) {
      const ld = $id('logoDraggable'), r = ld.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      logoTScale = Math.max(0.05, logoScaleStart2 * (Math.hypot(p.x-cx, p.y-cy) / logoScaleStart2Dist));
      applyLogoTransform();
    }
  }

  document.addEventListener('mouseup',  onUp);
  document.addEventListener('touchend', onUp);
  function onUp() {
    elDragging=false; elRotating=false; elScaling=false;
    bgDragging=false; bgRotating=false; bgScaling=false;
    logoDragging2=false; logoRotating2=false; logoScaling2=false;
    genDragging=false; genScaling=false;
    titleDragging2=false; titleRotating2=false; titleScaling2=false;
  }
})();

// ─── ORIENTATION ─────────────────────────────────────────────────────────────
function toggleOrientation() {
  orientation = orientation === 'landscape' ? 'portrait' : 'landscape';
  const outer = $id('playAreaOuter');
  if (orientation === 'landscape') {
    outer.className = 'play-area-outer landscape';
    $id('playAreaLabel').textContent = '1920 × 1080';
    $id('orientInfo').textContent    = 'Landscape · 1920×1080';
    $id('orientBtnTxt').textContent  = 'Portrait';
  } else {
    outer.className = 'play-area-outer portrait';
    $id('playAreaLabel').textContent = '1080 × 1920';
    $id('orientInfo').textContent    = 'Portrait · 1080×1920';
    $id('orientBtnTxt').textContent  = 'Landscape';
  }
  // Snapshot positions as % of current play area BEFORE transition
  const area0 = $id('playAreaInner');
  const aW0 = area0.offsetWidth, aH0 = area0.offsetHeight;
  const _logoPctX = aW0 > 0 ? logoTX / aW0 : 0.26;
  const _logoPctY = aH0 > 0 ? logoTY / aH0 : 0.70;
  const _logoScalePct = aH0 > 0 ? (logoTW * logoTScale) / Math.min(aW0, aH0) : 0.45;
  // Title position as % too
  const _titlePctX = aW0 > 0 ? titleTX / aW0 : 0.5;
  const _titlePctY = aH0 > 0 ? titleTY / aH0 : 0.3;

  // After CSS transition settles, restore positions in new play area coords
  setTimeout(() => {
    const area2 = $id('playAreaInner');
    const aW2 = area2.offsetWidth, aH2 = area2.offsetHeight;

    if (selLogo) {
      // Restore logo position and size proportionally
      logoTX = _logoPctX * aW2;
      logoTY = _logoPctY * aH2;
      const newBase = Math.min(aW2, aH2);
      const targetSize = _logoScalePct * newBase;
      logoTW = targetSize / logoTScale;
      applyLogoTransform();
    }

    // Restore title position proportionally (whether or not manually moved)
    if ($id('titleDraggable')?.style.display !== 'none') {
      titleTX = _titlePctX * aW2;
      titleTY = _titlePctY * aH2;
      applyTitleTransform(false);
    }
  }, 420);
}

// ─── SECTIONS ────────────────────────────────────────────────────────────────
function toggleSection(id) {
  const s = $id(id);
  if (s.classList.contains('locked')) return;
  s.classList.toggle('open');
}
function activateSection(id, n) {
  const s = $id(id);
  s.classList.remove('locked'); s.classList.add('open','active');
  $id('badge'+n).className = 'step-badge active';
  $id('title'+n).className = 'section-title active';
  $id('summary'+n).textContent = '';
}
function markDone(id, n, txt) {
  $id(id).classList.remove('active','open');
  $id('badge'+n).className = 'step-badge done';
  $id('title'+n).className = 'section-title done';
  $id('summary'+n).textContent = txt;
}
function lockSection(id, n) {
  const s = $id(id);
  s.classList.add('locked'); s.classList.remove('open','active');
  $id('badge'+n).className = 'step-badge';
  $id('title'+n).className = 'section-title';
  $id('summary'+n).textContent = '';
}

// ─── STEP 1 ──────────────────────────────────────────────────────────────────
function selectCat(cat) {
  selCat = cat; selBaseImg = null; selEl = null;
  imgGenerated = false;
  lockSection('step2Section',2); lockSection('step3Section',3);
  // Do NOT clear logo — user keeps their logo/title when switching base image
  // Reset play area completely when starting over
  const _bg = $id('bgImage');
  if (_bg) { _bg.classList.remove('visible'); _bg.style.background = ''; _bg.style.backgroundImage = ''; }
  const _bp = $id('basePreview'); if (_bp) { _bp.style.display='none'; _bp.src=''; }
  const _ep = $id('elPreview'); if (_ep) { _ep.style.display='none'; _ep.src=''; }
  const _bp3 = $id('basePreview'); if (_bp3) { _bp3.style.display='none'; _bp3.src=''; }
  const _eh = $id('elHandles'); if (_eh) _eh.style.display='none';
  const _bh = $id('bgHandles'); if (_bh) _bh.style.display='none';
  elX=0; elY=0; elScale=1; elRot=0; elFile='';
  bgX=0; bgY=0; bgScale=1; bgRot=0; elSelected=false; bgSelected=false;
  imgGenerated = false;
  updateGenBtn(); updateExportBtn();

  ['tropical','water','body'].forEach(c =>
    $id('basebtn-'+c).classList.toggle('selected', c===cat)
  );

  document.querySelector('.base-choices').classList.add('has-selection');
  $id('basePickerLbl').textContent = cat.toUpperCase() + ' — Pick one of 10 images';
  buildBaseGrid(cat);
  $id('baseImgPicker').style.display = 'block';
}

function buildBaseGrid(cat) {
  // Files: Landscape 01-05 then Portrait 01-05
  // Display order: 1-5 = Landscape, 6-10 = Portrait
  const catName = { tropical:'Tropical', water:'Water', body:'Body' }[cat];
  const files = [
    ...Array.from({length:5}, (_,i) => `Foams-Brand-Images-${catName}-Landscape-0${i+1}.jpg`),
    ...Array.from({length:5}, (_,i) => `Foams-Brand-Images-${catName}-Portrait-0${i+1}.jpg`),
  ];
  const labels = [
    ...Array.from({length:5}, (_,i) => `L${String(i+1).padStart(2,'0')}`),
    ...Array.from({length:5}, (_,i) => `P${String(i+1).padStart(2,'0')}`),
  ];

  const grid = $id('baseImgGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const t = document.createElement('div');
    t.className = 'img-tile'; t.id = 'bimg-'+(i+1);
    t.style.position = 'relative'; t.style.overflow = 'hidden';
    t.innerHTML = `
      <img src="${files[i]}" alt="${labels[i]}"
        loading="lazy" decoding="async"
        width="80" height="50"
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="t-num" style="display:none">${labels[i]}</span>
      <span class="t-lbl" style="position:absolute;bottom:3px;left:0;right:0;text-align:center;
        font-size:7px;font-weight:800;letter-spacing:0.1em;color:rgba(255,255,255,0.7);
        text-shadow:0 1px 3px rgba(0,0,0,0.8);text-transform:uppercase;pointer-events:none;">
        ${labels[i]}
      </span>
    `;
    t.onclick = () => selectBaseImg(i+1);
    grid.appendChild(t);
  }
}

function selectBaseImg(n) {
  selBaseImg = n;
  // Determine the actual filename (1-5 = Landscape, 6-10 = Portrait)
  const catName = { tropical:'Tropical', water:'Water', body:'Body' }[selCat];
  if (n <= 5) {
    selBaseFile = `Foams-Brand-Images-${catName}-Landscape-0${n}.jpg`;

  $id('bimg-'+n).classList.add('selected');

async function fileToBase64(url) {
  const res = await fetch(url);
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]); // strip data:...;base64,
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function generateImage() {
  if (!selCat || !selBaseImg || !selEl || !selLogo) return;
  const btn = $id('genBtn');
  btn.disabled = true;
  btn.classList.remove('ready', 'regenerate');
  btn.classList.add('running');
  btn.textContent = 'Remixing…';
  showProgress(5, 'Preparing…');

  try {
    // Determine file paths
    const elType   = selEl.startsWith('defocus') ? 'defocus' : 'pinkvec';
    const elNum    = selEl.split('-')[1];
    const elPrefix = elType === 'defocus'
      ? 'Foams-Brand-Graphic-DefocusLight-'
      : 'Foams-Brand-Graphic-PinkVectors-';
    const elFile   = elPrefix + String(elNum).padStart(2,'0') + '.png';
    const baseFile = selBaseFile;

    const size = orientation === 'landscape' ? '1536x1024' : '1024x1536';
    const prompt = buildPrompt(size);

    // Composite base + element onto canvas (NO logo/title) and send as one image
    showProgress(15, 'Compositing images…');

    // Helper to load an image into an HTMLImageElement
    function loadImg(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function b64ToBlob(b64, mimeType) {
      const bytes = atob(b64);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return new Blob([arr], { type: mimeType });
    }

    // Determine output canvas size in pixels
    const isLandscape = orientation === 'landscape';
    const canvasW = isLandscape ? 1536 : 1024;
    const canvasH = isLandscape ? 1024 : 1536;

    // Draw the composition on an off-screen canvas
    const compCanvas = document.createElement('canvas');
    compCanvas.width  = canvasW;
    compCanvas.height = canvasH;
    const ctx = compCanvas.getContext('2d');

    // Draw base image cover-scaled (static, no user transform)
    const baseImg = await loadImg(baseFile);
    const area = $id('playAreaInner');
    const aW = area.offsetWidth, aH = area.offsetHeight;
    const scX = canvasW / aW, scY = canvasH / aH;
    {
      const bs = Math.max(canvasW / baseImg.width, canvasH / baseImg.height);
      const bw = baseImg.width * bs, bh = baseImg.height * bs;
      ctx.drawImage(baseImg, (canvasW-bw)/2, (canvasH-bh)/2, bw, bh);
    }

    // Draw graphical element at its current transform, scaled to canvas coords
    if (elFile && $id('elPreview').style.display !== 'none') {

      const elImg = await loadImg(elFile);
      const drawW = elW * elScale * scX;
      const drawH = elH * elScale * scY;
      const cx    = elX * scX;
      const cy    = elY * scY;

      ctx.save();
      ctx.translate(cx, cy);
      if (elFlipX) ctx.scale(-1, 1);
      ctx.rotate(elRot * Math.PI / 180);
      ctx.drawImage(elImg, -drawW/2, -drawH/2, drawW, drawH);
      ctx.restore();
    }

    // Convert canvas to blob to send to API
    const compositeBlob = await new Promise(res => compCanvas.toBlob(res, 'image/jpeg', 0.92));
    const compositeB64  = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = () => res(reader.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(compositeBlob);
    });

    showProgress(35, 'Sending base images…');

    // Tick progress while API processes
    let _fakePct = 35;
    const _ticker = setInterval(() => {
      if (_fakePct < 70) {
        _fakePct += 0.4;
        const msgs = [
          [35, 'Composing images…'],
          [46, 'Blending layers…'],
          [57, 'Refining details…'],
          [65, 'Finalising…'],
        ];
        const msg = msgs.reduce((a, m) => _fakePct >= m[0] ? m : a, msgs[0]);
        showProgress(Math.round(_fakePct), msg[1]);
      }
    }, 800);

    // Send composite as single image to /v1/images/edits
    const formData = new FormData();
    formData.append('model', 'gpt-image-1');
    formData.append('prompt', prompt);
    formData.append('size', size);
    formData.append('quality', 'medium');
    formData.append('n', '1');
    formData.append('image[]', b64ToBlob(compositeB64, 'image/jpeg'), 'composed.jpg');

    const res = await fetch('https://foams-generator.plattformplus.workers.dev/', {
      method: 'POST',
      body: formData,
    });

    clearInterval(_ticker);
    showProgress(75, 'Processing response…');
    const rawText = await res.text();
    console.log('API raw response (first 500):', rawText.substring(0, 500));

    let data;
    try { data = JSON.parse(rawText); }
    catch(e) { throw new Error('Invalid JSON from API: ' + rawText.substring(0, 300)); }

    if (!res.ok) {
      throw new Error(data?.error?.message || `API error ${res.status}`);
    }

    // /v1/images/edits returns data[0].b64_json
    let imageUrl = null;
    if (data.data?.[0]?.b64_json) {
      imageUrl = `data:image/png;base64,${data.data[0].b64_json}`;
    } else if (data.data?.[0]?.url) {
      imageUrl = data.data[0].url;
    }

    showProgress(95, 'Almost done…');
    if (!imageUrl) {
      console.error('Full API response:', JSON.stringify(data).substring(0, 1000));
      throw new Error('No image in API response — check console');
    }

    // Display generated image as a moveable <img>
    const bg = $id('bgImage');
    generatedImageUrl = imageUrl;
    bg.src = imageUrl;
    bg.style.display = 'block';
    bg.style.cursor = 'grab';
    // Initialize transform: cover-fit the play area
    bg.onload = () => {
      const area3 = $id('playAreaInner');
      const aW3 = area3.offsetWidth, aH3 = area3.offsetHeight;
      const sc = Math.max(aW3 / bg.naturalWidth, aH3 / bg.naturalHeight);
      genW = bg.naturalWidth; genH = bg.naturalHeight;
      genScale = sc; genRot = 0;
      genX = aW3 / 2; genY = aH3 / 2;
      genSelected = false;
      applyGenTransform();
    };

    // Hide composition layers — generated image takes over
    const _bp2 = $id('basePreview'); if (_bp2) _bp2.style.display = 'none';
    const _ep2 = $id('elPreview');   if (_ep2) _ep2.style.display = 'none';
    const _eh2 = $id('elHandles');   if (_eh2) _eh2.style.display = 'none';
    const _bh2 = $id('bgHandles');   if (_bh2) _bh2.style.display = 'none';

    showProgress(100, 'Done!');
    setTimeout(hideProgress, 600);
    imgGenerated = true;
    updateExportBtn();
    btn.innerHTML = '↺ Remix';
    btn.classList.remove('running', 'ready');
    btn.classList.add('regenerate');
    btn.disabled = false;

  } catch(err) {
    try { clearInterval(_ticker); } catch(e) {}
    hideProgress();
    console.error('Generation error:', err);
    btn.innerHTML = '↺ Remix';
    btn.classList.remove('running');
    btn.classList.add('regenerate');
    btn.disabled = false;
    // Show error message briefly
    setTimeout(() => {
      if (btn.classList.contains('regenerate')) {
        btn.innerHTML = '↺ Remix';
      }
    }, 3000);
  }
}

function buildPrompt(size) {
  const bodyRule = selCat === 'body'
    ? '\nIMPORTANT: Do not alter the people in the image in any way — their faces, bodies and expressions must remain exactly as in the original.'
    : '';
  return `Make an image highly inspired by the attached image
Use both image and graphical element in your composition
Feel free to use blend modes if it looks nice, but not mandatory
Take full creative freedom to distort the elements, but keep the overall vibe exactly the same
Do not use text or UI elements, no UI no text elements
Keep the vibe elegant, modern and a bit mysterious${bodyRule}`;
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
async function exportImage() {
  // Can export at any stage: generated result, or composed preview, or even blank
  const isLandscape = orientation === 'landscape';
  const outW = isLandscape ? 1920 : 1080;
  const outH = isLandscape ? 1080 : 1920;
  const filename = `foams-image-${orientation}-${Date.now()}.png`;

  const canvas = document.createElement('canvas');
  canvas.width  = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');

  function loadImg(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  const area  = $id('playAreaInner');
  const aW    = area.offsetWidth, aH = area.offsetHeight;
  const scX   = outW / aW, scY = outH / aH;

  try {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, outW, outH);

    // 1a. If we have a generated (remixed) result, draw that first
    if (generatedImageUrl) {
      const bgImg = await loadImg(generatedImageUrl);
      // If user repositioned the generated image, use that transform
      if (genW > 0) {
        const gDrawW = genW * genScale * scX;
        const gDrawH = genH * genScale * scY;
        const gcx = genX * scX, gcy = genY * scY;
        ctx.save();
        ctx.translate(gcx, gcy);
        ctx.rotate(genRot * Math.PI / 180);
        ctx.drawImage(bgImg, -gDrawW/2, -gDrawH/2, gDrawW, gDrawH);
        ctx.restore();
      } else {
        const scale = Math.max(outW / bgImg.width, outH / bgImg.height);
        const dw = bgImg.width * scale, dh = bgImg.height * scale;
        ctx.drawImage(bgImg, (outW-dw)/2, (outH-dh)/2, dw, dh);
      }
    }

    // 1b. Otherwise draw the composed preview (base + element at their transforms)
    else {
      const bp = $id('basePreview');
      if (bp && bp.style.display !== 'none' && bp.src) {
        const baseImg = await loadImg(bp.src);
        const bs = Math.max(outW / baseImg.width, outH / baseImg.height);
        const bw = baseImg.width * bs, bh = baseImg.height * bs;
        ctx.drawImage(baseImg, (outW-bw)/2, (outH-bh)/2, bw, bh);
      }
      const ep = $id('elPreview');
      if (ep && ep.style.display !== 'none' && ep.src) {
        const elImg = await loadImg(ep.src);
        const drawW = elW * elScale * scX;
        const drawH = elH * elScale * scY;
        const cx = elX * scX, cy = elY * scY;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(elRot * Math.PI / 180);
        if (elFlipX) ctx.scale(-1, 1);
        ctx.drawImage(elImg, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
      }
    }

    // 2. Draw the logo + title if present
    if (selLogo) {
      // Get play-area dimensions to compute scaling ratio
      const area  = $id('playAreaInner');
      const aW    = area.offsetWidth;
      const aH    = area.offsetHeight;
      const scaleX = outW / aW;
      const scaleY = outH / aH;

      // Logo: logoPctX/Y is center as % of play area; logoScale is % of min(aW,aH)
      const baseSize   = Math.min(aW, aH);
      const logoPxW    = baseSize * (logoScale / 100);  // logo size in play-area px
      const logoCX_pa  = (logoPctX / 100) * aW;         // center x in play-area px
      const logoCY_pa  = (logoPctY / 100) * aH;         // center y in play-area px

      // Scale to output canvas coords
      const logoOutSize = Math.min(outW, outH) * (logoScale / 100);
      const logoOutX    = logoCX_pa * scaleX - logoOutSize / 2;
      const logoOutY    = logoCY_pa * scaleY - logoOutSize / 2;

      // Draw logo image — preserve natural aspect ratio (logo PNG is wide, not square)
      const logoSrc = $id('logoImg')?.src;
      if (logoSrc && $id('logoImg').style.display !== 'none') {
        const logoImg = await loadImg(logoSrc);
        // object-fit:contain behaviour: fit within the square box, centered
        const nat    = logoImg.naturalWidth / logoImg.naturalHeight;
        let   lw, lh;
        if (nat >= 1) {
          // wider than tall — width fills the box
          lw = logoOutSize;
          lh = logoOutSize / nat;
        } else {
          // taller than wide — height fills the box
          lh = logoOutSize;
          lw = logoOutSize * nat;
        }
        // Center within the draggable box position
        const lx = logoOutX + (logoOutSize - lw) / 2;
        const ly = logoOutY + (logoOutSize - lh) / 2;
        ctx.drawImage(logoImg, lx, ly, lw, lh);
      }

      // 3. Draw title text if present
      if (selTitle) {
        const titleEl = $id('logoTitle');
        if (titleEl && titleEl.style.display !== 'none') {
          // Get title position in play-area coords
          const tRect   = titleEl.getBoundingClientRect();
          const aRect   = area.getBoundingClientRect();
          const tLeft_pa = tRect.left - aRect.left;  // in play-area px
          const tTop_pa  = tRect.top  - aRect.top;

          // Scale to canvas
          const tLeft_out = tLeft_pa * scaleX;
          const tTop_out  = tTop_pa  * scaleY;

          // Font size: same proportion as in play-area but scaled up
          const logoPxInPlayArea = Math.min(aW, aH) * (logoScale / 100);
          const fontSizePlay = Math.max(5, Math.round(logoPxInPlayArea * 0.08));
          const fontSizeOut  = Math.round(fontSizePlay * scaleX);

          ctx.save();
          ctx.font = `700 ${fontSizeOut}px 'Trebuchet MS', Trebuchet, sans-serif`;
          ctx.textBaseline = 'top';
          const colorMap = { white:'#ffffff', black:'#000000', pink:'#ff30ff' };
          ctx.fillStyle = colorMap[logoColor] || '#ffffff';
          ctx.fillText(selTitle, tLeft_out, tTop_out);
          ctx.restore();
        }
      }
    }

    // 4. Download
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }, 'image/png');

  } catch(err) {
    console.error('Export failed:', err);
    // Fallback: just download the generated image without compositing
    const a = document.createElement('a');
    a.href = generatedImageUrl;
    a.download = filename;
    a.click();
  }
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (selLogo) applyLogoPos();
  sendHeight();
});

// ─── IFRAME HEIGHT REPORTER ──────────────────────────────────────────────────
// Wrapped in rAF to break the ResizeObserver loop: reading scrollHeight
// after a layout change would otherwise re-trigger the observer.
let _heightRafId = null;
function sendHeight() {
  if (_heightRafId) return;          // already queued
  _heightRafId = requestAnimationFrame(() => {
    _heightRafId = null;
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'foams-height', height: h }, '*');
  });
}
sendHeight();
const _ro = new ResizeObserver(sendHeight);
_ro.observe(document.body);

// ─── FIXED PLAY AREA ─────────────────────────────────────────────────────────
// position:sticky fails inside iframes when the parent page owns the scroll.
// We switch to position:fixed and compensate with paddingTop on body.
// The ResizeObserver callback is deferred via rAF to prevent the
// "ResizeObserver loop completed with undelivered notifications" error.
(function initFixedPlayArea() {
  const stickyEl  = document.querySelector('.sticky-top');
  if (!stickyEl) return;

  const bodyStyle = getComputedStyle(document.body);
  const padL = parseFloat(bodyStyle.paddingLeft)  || 0;
  const padR = parseFloat(bodyStyle.paddingRight) || 0;

  let _rafId = null;
  function scheduleApply() {
    if (_rafId) return;
    _rafId = requestAnimationFrame(() => {
      _rafId = null;
      stickyEl.style.position   = 'fixed';
      stickyEl.style.top        = '0';
      stickyEl.style.left       = padL + 'px';
      stickyEl.style.right      = padR + 'px';
      stickyEl.style.width      = 'auto';
      stickyEl.style.zIndex     = '999';
      stickyEl.style.background = '#111';
      document.body.style.paddingTop = stickyEl.offsetHeight + 'px';
    });
  }

  scheduleApply();
  new ResizeObserver(scheduleApply).observe(stickyEl);
  window.addEventListener('load', scheduleApply);
})();
</script>
